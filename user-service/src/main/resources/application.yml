spring:
  application:
    name: user-service

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: jdbc:h2:file:./data/user-db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

server:
  port: 8081

eureka:
  client:
    serviceUrl:
      defaultZone: http://service-registry:8761/eureka/

# Vault configuration — the token is resolved from VAULT_TOKEN env var or
# a Docker secret file at /run/secrets/vault-token-${spring.application.name}.
# The Vault host is configurable so this works both in Docker Compose
# (where Vault is at http://vault:8200) and in production (where Vault
# might be at https://vault.prod.example.com:8200).
vault:
  addr: ${VAULT_ADDR:http://vault:8200}
  token: ${VAULT_TOKEN:}
